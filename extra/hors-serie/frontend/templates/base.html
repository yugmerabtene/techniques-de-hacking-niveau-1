<!-- ============================================================================
     template de base (layout) — KillChainAgent
     Définit la structure commune à toutes les pages :
       - nav    : barre de navigation fixe (titre + lien dashboard + version)
       - main   : conteneur principal, les templates enfants injectent leur
                  contenu via le bloc Jinja { % block content %}{ % endblock %}
     ============================================================================ -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KillChainAgent — Orchestrateur ATT&CK</title>
    <!-- Chargement de TailwindCSS depuis le CDN (mode JIT) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- bg-slate-950 : fond très sombre · text-slate-200 : texte clair · min-h-screen : hauteur pleine page -->
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <!-- ========================================================================
         NAV — barre de navigation supérieure
         bg-slate-900 : fond légèrement plus clair que le body
         border-b border-slate-700 : séparation visuelle avec le contenu
         max-w-7xl mx-auto : centrage + largeur max responsive
         ======================================================================== -->
    <nav class="bg-slate-900 border-b border-slate-700 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <!-- Titre de l'application -->
            <h1 class="text-xl font-bold">KillChainAgent</h1>
            <!-- Liens de navigation -->
            <div class="flex gap-6 text-sm">
                <a href="/" class="hover:text-red-400 transition">Dashboard</a>
                <span class="text-slate-500">v0.1.0</span>
            </div>
        </div>
    </nav>

    <!-- ========================================================================
         MAIN — conteneur principal du contenu
         max-w-7xl mx-auto : largeur max 80rem, centré horizontalement
         p-6 : padding intérieur 1.5rem
         Le bloc Jinja { % block content %} est remplacé par le contenu
         des templates enfants (dashboard.html, mission.html, etc.)
         ======================================================================== -->
    <main class="max-w-7xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
