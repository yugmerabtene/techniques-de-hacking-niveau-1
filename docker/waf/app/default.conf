# =====================================================================
# default.conf — Configuration du serveur nginx + ModSecurity WAF
# =====================================================================
# Virtual host nginx servant l'application PHP vulnérable.
# ModSecurity (compilé en module nginx) intercepte toutes les requêtes
# avant qu'elles n'atteignent PHP et applique les règles CRS.
#
# Architecture de la requête :
#   Client → nginx (port 80) → ModSecurity (inspection) → PHP-FPM (socket Unix)
# =====================================================================

server {
    # Écoute sur le port 80 (HTTP standard)
    listen 80;

    # server_name _ = répond à toutes les requêtes (wildcard)
    server_name _;

    # Racine des fichiers web servis par nginx
    root /usr/share/nginx/html;

    # Fichier index par défaut si seul un répertoire est demandé
    index index.php;

    # Bloc principal — gère toutes les requêtes
    location / {
        # try_files : essaie de servir le fichier exact, puis le répertoire,
        # puis redirige vers index.php avec les arguments de la requête
        try_files $uri $uri/ /index.php?$args;
    }

    # Bloc de traitement des fichiers PHP
    # Toute requête vers un fichier .php passe par ce bloc
    location ~ \.php$ {
        # Socket Unix de PHP-FPM — communication FastCGI locale
        # ModSecurity inspecte la requête AVANT qu'elle n'atteigne ce socket
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;

        # SCRIPT_FILENAME : chemin absolu du script PHP à exécuter
        # $document_root = /usr/share/nginx/html
        # $fastcgi_script_name = /index.php
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Inclusion des paramètres FastCGI standards (QUERY_STRING, REQUEST_METHOD, etc.)
        include fastcgi_params;
    }
}
