<!-- ============================================================================
     mission.html — page de détail d'une mission
     Hérite du layout base.html via { % extends "base.html" %}.
     Affiche : infos de la mission, progression de la Kill Chain,
              résultats détaillés par agent.
     La variable Jinja {{ mission_id }} est injectée par le backend.
     Rafraîchissement automatique toutes les 5 secondes (setInterval).
     ============================================================================ -->
{% extends "base.html" %}
{% block content %}

<!-- ========================================================================
     Lien de retour vers le Dashboard
     ======================================================================== -->
<div class="mb-6">
    <a href="/" class="text-slate-400 hover:text-white transition text-sm">&larr; Retour au Dashboard</a>
</div>

<!-- ========================================================================
     SECTION 1 — Grille supérieure (3 colonnes sur desktop, 1 sur mobile)
     Colonne 1 : infos de la mission (ID, cible, statut, étapes)
     Colonnes 2-3 : progression de la Kill Chain
     ======================================================================== -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <!-- ====================================================================
         CARTE — Informations de la mission
         Colonne 1/3. Données remplies par loadMission() (GET /missions/<id>).
         Contient : ID, cible, statut, nombre d'étapes de la Kill Chain.
         ==================================================================== -->
    <div class="bg-slate-800 rounded-lg p-6 border border-slate-700">
        <h2 class="text-lg font-semibold mb-2">Mission</h2>
        <div class="space-y-2 text-sm">
            <div><span class="text-slate-500">ID :</span> <span id="m-id" class="font-mono"></span></div>
            <div><span class="text-slate-500">Cible :</span> <span id="m-target"></span></div>
            <div><span class="text-slate-500">Statut :</span> <span id="m-status"></span></div>
            <div><span class="text-slate-500">Étapes :</span> <span id="m-steps"></span></div>
        </div>
    </div>

    <!-- ====================================================================
         CARTE — Progression de la Kill Chain
         Colonnes 2-3/3 (lg:col-span-2).
         Remplie par renderKillChain() qui affiche chaque étape avec :
         ordre, tactic_id, tactic_name, technique_id, outil, badge de statut.
         ==================================================================== -->
    <div class="lg:col-span-2 bg-slate-800 rounded-lg p-6 border border-slate-700">
        <h2 class="text-lg font-semibold mb-4">Kill Chain Progression</h2>
        <div id="killchain-steps" class="space-y-3"></div>
    </div>
</div>

<!-- ========================================================================
     SECTION 2 — Résultats détaillés par agent
     Chaque étape avec output est affichée dans un élément <details>
     pliable. Peuplée par renderAgentResults() qui filtre les étapes
     ayant un champ `output` non vide.
     Le bouton "Exécuter la Kill Chain" appelle executeMission()
     (POST /missions/<id>/execute).
     ======================================================================== -->
<div class="bg-slate-800 rounded-lg p-6 border border-slate-700">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Détail des agents</h2>
        <div class="flex gap-3">
            <button onclick="executeMission()" id="btn-execute"
                    class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium transition">
                Exécuter la Kill Chain
            </button>
            <button onclick="location.reload()"
                    class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm transition">
                Rafraîchir
            </button>
        </div>
    </div>
    <div id="agent-results" class="space-y-4"></div>
</div>

<!-- ========================================================================
     JAVASCRIPT — Fonctions de la page mission
     Cinq fonctions :
       - loadMission()     : charge les données de la mission
       - statusBadge()     : utilitaire, retourne le HTML d'un badge de statut
       - renderKillChain() : affiche la liste des étapes de la Kill Chain
       - renderAgentResults() : affiche les résultats détaillés par agent
       - executeMission()  : lance l'exécution de la Kill Chain
     Rafraîchissement auto : setInterval(loadMission, 5000) toutes les 5s.
     ======================================================================== -->
<script>
// missionId est injecté par le backend Jinja à partir de la route
// Exemple : si l'URL est /missions/abc-123, missionId = "abc-123"
const missionId = "{{ mission_id }}";

// =========================================================================
// loadMission()
// Charge les données complètes de la mission depuis l'API.
//   - GET /missions/<missionId>
//   - L'API répond : { target, status, killchain: [...] }
//   - Chaque étape du killchain a :
//       order, tactic_id, tactic_name, technique_id, tool, agent,
//       status, output (peut être null)
//   - Met à jour les champs d'info (ID, cible, statut, nb étapes)
//   - Appelle renderKillChain() et renderAgentResults()
//   - Si le statut est "completed", masque le bouton d'exécution
// =========================================================================
async function loadMission() {
    // Requête AJAX GET → endpoint /missions/<missionId>
    const resp = await fetch(`/missions/${missionId}`);
    const data = await resp.json();
    if (data.error) return; // Erreur serveur → on ne fait rien

    // Remplissage des champs d'information de la mission
    document.getElementById('m-id').textContent = missionId;
    document.getElementById('m-target').textContent = data.target || '—';
    document.getElementById('m-status').textContent = data.status || '—';

    const killchain = data.killchain || [];
    document.getElementById('m-steps').textContent = killchain.length;

    // Rendu des deux sections visuelles
    renderKillChain(killchain);
    renderAgentResults(killchain);

    // Mission terminée → on masque le bouton d'exécution
    if (data.status === 'completed') {
        document.getElementById('btn-execute').classList.add('hidden');
    }
}

// =========================================================================
// statusBadge(status)
// Fonction utilitaire pure — retourne le HTML d'un badge coloré
// correspondant au statut d'une étape.
//   - Entrée  : "completed" | "running" | "failed" | "idle" | autre
//   - Sortie  : chaîne HTML <span class="...">status</span>
//   - Couleurs : vert (completed), jaune (running), rouge (failed),
//                gris (idle / défaut)
// =========================================================================
function statusBadge(status) {
    const colors = {
        completed: 'bg-green-900/50 text-green-300 border-green-700',
        running: 'bg-yellow-900/50 text-yellow-300 border-yellow-700',
        failed: 'bg-red-900/50 text-red-300 border-red-700',
        idle: 'bg-slate-700 text-slate-400 border-slate-600',
    };
    const c = colors[status] || colors.idle; // défaut → idle si statut inconnu
    return `<span class="px-2 py-0.5 rounded text-xs border ${c}">${status}</span>`;
}

// =========================================================================
// renderKillChain(steps)
// Affiche la progression visuelle de la Kill Chain dans #killchain-steps.
//   - Entrée  : tableau d'étapes (steps) venant de l'API
//   - Chaque étape est rendue comme une ligne flex avec :
//       numéro d'ordre (cercle), tactic_id, tactic_name,
//       technique_id, outil utilisé, badge de statut
//   - Si aucune étape, affiche un message "Aucune étape planifiée"
// =========================================================================
function renderKillChain(steps) {
    const container = document.getElementById('killchain-steps');
    if (!steps.length) {
        container.innerHTML = '<p class="text-slate-500 text-sm">Aucune étape planifiée.</p>';
        return;
    }
    // Construction HTML : une ligne par étape avec template literal
    container.innerHTML = steps.map((s, i) => `
        <div class="flex items-center gap-3 text-sm">
            <!-- Cercle numéroté indiquant l'ordre dans la Kill Chain -->
            <span class="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center text-xs text-slate-400">${s.order}</span>
            <span class="w-24 font-mono text-slate-500">${s.tactic_id}</span>
            <span class="bg-slate-700 px-2 py-0.5 rounded text-xs text-slate-300">${s.tactic_name}</span>
            <span class="text-slate-400">${s.technique_id}</span>
            <span class="text-slate-500">→ ${s.tool}</span>
            <span class="text-xs">${statusBadge(s.status || 'idle')}</span>
        </div>
    `).join('');
}

// =========================================================================
// renderAgentResults(steps)
// Affiche les résultats détaillés pour les étapes qui ont déjà produit
// une sortie (output). Utilise des éléments <details> pliables.
//   - Entrée  : tableau d'étapes (steps)
//   - Filtre pour ne garder que les étapes avec s.output non vide
//   - Chaque résultat est affiché dans un <details> avec :
//       summary : nom de l'agent, outil, badge de statut
//       pre     : sortie JSON formatée (JSON.stringify avec indentation 2)
//   - Si aucun résultat, affiche "Agent en attente d'exécution"
// =========================================================================
function renderAgentResults(steps) {
    const container = document.getElementById('agent-results');
    // On n'affiche que les étapes qui ont déjà un résultat
    const withOutput = steps.filter(s => s.output);
    if (!withOutput.length) {
        container.innerHTML = '<p class="text-slate-500 text-sm">Agent en attente d\'exécution.</p>';
        return;
    }
    // Construction des blocs <details> pliables
    container.innerHTML = withOutput.map(s => `
        <details class="bg-slate-900 rounded-lg border border-slate-700">
            <summary class="px-4 py-3 cursor-pointer hover:bg-slate-800 transition rounded-lg">
                <span class="font-medium">${s.agent}</span>
                <span class="text-slate-500 ml-2">${s.tool}</span>
                ${statusBadge(s.status)}
            </summary>
            <!-- Sortie JSON brute de l'agent, formatée avec indentation -->
            <pre class="px-4 py-3 text-xs text-slate-400 overflow-x-auto border-t border-slate-700 whitespace-pre-wrap">${JSON.stringify(s.output, null, 2)}</pre>
        </details>
    `).join('');
}

// =========================================================================
// executeMission()
// Lance l'exécution de la Kill Chain pour cette mission.
//   - POST /missions/<missionId>/execute (body vide, pas de payload)
//   - Désactive le bouton pendant l'exécution (évite double-clic)
//   - Une fois la réponse reçue, recharge les données via loadMission()
//   - Réactive le bouton après chargement
//   - L'API répond avec la mission mise à jour (statut, killchain, etc.)
// =========================================================================
async function executeMission() {
    const btn = document.getElementById('btn-execute');
    // Verrouillage du bouton pour éviter les double-soumissions
    btn.disabled = true;
    btn.textContent = 'Exécution en cours...';

    // Requête AJAX POST → endpoint /missions/<missionId>/execute
    const resp = await fetch(`/missions/${missionId}/execute`, { method: 'POST' });
    const data = await resp.json();
    // Recharge les données pour afficher l'état mis à jour
    await loadMission();

    // Déverrouillage du bouton
    btn.disabled = false;
    btn.textContent = 'Exécuter la Kill Chain';
}

// Chargement initial des données au chargement de la page
loadMission();

// =========================================================================
// Rafraîchissement automatique toutes les 5 secondes (5000ms)
// Permet de suivre en temps réel la progression de la Kill Chain
// sans avoir à cliquer manuellement sur "Rafraîchir".
// =========================================================================
setInterval(loadMission, 5000);
</script>

{% endblock %}
