services:
  # =================== Kali Attacker (Scenario B only) ===================
  kali-attacker:
    image: kalilinux/kali-rolling:latest
    container_name: kali-attacker
    command: tail -f /dev/null
    profiles:
      - full
    volumes:
      - ./scripts:/scripts:ro
      - ./hors-serie:/opt/killchain:ro
    restart: unless-stopped

  # =================== Day 1-2-3: Web vulnerabilities ===================
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa-target
    ports:
      - "8080:80"
    environment:
      - RECAPTCHA_PRIV_KEY=disabled
      - RECAPTCHA_PUB_KEY=disabled
    restart: unless-stopped

  # =================== Day 2: FTP/SMB/MySQL (Metasploitable 2) ===================
  vsftpd:
    image: tleemcjr/metasploitable2:latest
    container_name: vsftpd-target
    ports:
      - "21:21"
      - "22:22"
      - "23:23"
      - "25:25"
      - "53:53"
      - "80:80"
      - "110:110"
      - "139:139"
      - "143:143"
      - "445:445"
      - "3306:3306"
      - "3632:3632"
      - "5432:5432"
      - "6667:6667"
      - "8009:8009"
      - "8180:8180"
    restart: unless-stopped

  # =================== Day 3: Buffer overflow ===================
  buffovf:
    build: ./docker/buffovf
    container_name: buffovf-target
    ports:
      - "9001:9001"
    restart: unless-stopped

  # =================== Day 3: WAF bypass ===================
  waf-target:
    build: ./docker/waf
    container_name: waf-target
    ports:
      - "8081:80"
    restart: unless-stopped

  # =================== Day 4: Hardening ===================
  secure-linux:
    build: ./docker/secure-linux
    container_name: secure-linux-target
    ports:
      - "2222:22"
    privileged: true
    restart: unless-stopped

  # =================== Day 5: Forensic ===================
  forensic-victim:
    build: ./docker/forensic
    container_name: forensic-victim
    ports:
      - "8082:80"
    restart: unless-stopped

networks:
  default:
    name: pentest-lab
