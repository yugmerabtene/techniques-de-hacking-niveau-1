services:
  # =================== Day 1-2-3: Web vulnerabilities ===================
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa-target
    ports:
      - "8080:80"
    environment:
      - RECAPTCHA_PRIV_KEY=disabled
      - RECAPTCHA_PUB_KEY=disabled
    restart: unless-stopped

  # =================== Day 2: FTP backdoor ===================
  vsftpd:
    image: tleemcjr/metasploitable2:latest
    container_name: ftp-vuln
    ports:
      - "21:21"
      - "22:22"
      - "23:23"
      - "25:25"
      - "53:53"
      - "80:80"
      - "110:110"
      - "139:139"
      - "143:143"
      - "445:445"
      - "3306:3306"
      - "3632:3632"
      - "5432:5432"
      - "6667:6667"
      - "8009:8009"
      - "8180:8180"
    restart: unless-stopped

  # =================== Day 2 (J2) - SMB EternalBlue target ===================
  # uses vsftpd container above (SMB on port 445)

  # =================== Day 3: Buffer overflow target ===================
  buffovf:
    build: ./docker/buffovf
    container_name: buffovf-target
    ports:
      - "9001:9001"
    restart: unless-stopped

  # =================== Day 3: WAF bypass target ===================
  waf-target:
    build: ./docker/waf
    container_name: waf-target
    ports:
      - "8081:80"
    restart: unless-stopped

  # =================== Day 4: Hardening lab ===================
  secure-linux:
    build: ./docker/secure-linux
    container_name: secure-linux-target
    ports:
      - "2222:22"
    privileged: true
    restart: unless-stopped

  # =================== Day 5: Forensic victim ===================
  forensic-victim:
    build: ./docker/forensic
    container_name: forensic-victim
    ports:
      - "8082:80"
    restart: unless-stopped

networks:
  default:
    name: pentest-lab
