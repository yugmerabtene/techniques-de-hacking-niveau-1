# =============================================================================
# Lab de pentest — Techniques de hacking et contre-mesures (Niveau 1)
#
# Usage : docker compose up -d [service]
# Tous   : docker compose up -d --build
# Profil agent : docker compose --profile agent up -d killchain
# =============================================================================

services:
  # ========== KillChainAgent — Orchestrateur agentic (profil optionnel) ======
  killchain:
    build: ./hors-serie                    # Kali Linux + FastAPI + agents
    container_name: killchain-agent
    ports:
      - "8000:8000"                        # Dashboard web + API REST
    restart: unless-stopped
    profiles:
      - agent                              # Lancé uniquement avec --profile agent

  # ========== Jour 1-2-3 : Vulnérabilités web ===============================
  dvwa:
    image: vulnerables/web-dvwa:latest     # DVWA — XSS, CSRF, SQLi, CMDi
    container_name: dvwa-target
    ports:
      - "8088:80"                          # Interface web DVWA (host 8088)
    environment:
      - RECAPTCHA_PRIV_KEY=disabled        # Désactive reCAPTCHA (mode lab)
      - RECAPTCHA_PUB_KEY=disabled
    restart: unless-stopped

  # ========== Jour 1 : Application SQLi dédiée ==============================
  sqli-app:
    build: ./docker/sqli-app               # PHP + SQLite, 3 points d'injection
    container_name: sqli-app-target
    ports:
      - "8083:80"                          # Injection numérique, auth bypass, LIKE
    restart: unless-stopped

  # ========== Jour 2 : Metasploitable 2 (FTP, SMB, SSH, MySQL...) ===========
  vsftpd:
    image: tleemcjr/metasploitable2:latest # Ubuntu 8.04 multi-vulnérable
    container_name: vsftpd-target
    command: /bin/bash -c "/bin/services.sh && tail -f /dev/null"
    ports:
      - "21:21"        # FTP   — vsftpd 2.3.4 (backdoor)
      - "2223:22"      # SSH   — OpenSSH 4.7p1 (host 2223 pour éviter conflit)
      - "23:23"        # Telnet
      - "25:25"        # SMTP
      # - "53:53"      # DNS (désactivé — port réservé par systemd-resolved)
      - "8085:80"      # HTTP  — Apache 2.2.8 (host 8085)
      - "110:110"      # POP3
      - "139:139"      # NetBIOS
      - "143:143"      # IMAP
      - "445:445"      # SMB   — Samba 3.0.20 (usermap_script)
      - "3306:3306"    # MySQL 5.0.51a
      - "3632:3632"    # DistCC
      - "5432:5432"    # PostgreSQL 8.3.0
      - "6667:6667"    # IRC   — UnrealIRCd
      - "6200:6200"    # Backdoor vsftpd 2.3.4 (shell root)
      - "8009:8009"    # AJP
      - "8180:8180"    # Tomcat
    restart: unless-stopped

  # ========== Jour 3 : Buffer overflow ======================================
  buffovf:
    build: ./docker/buffovf                # Binaire C vulnérable (strcpy)
    container_name: buffovf-target
    ports:
      - "9001:9001"                        # Service TCP exposé via socat
    restart: unless-stopped

  # ========== Jour 3 : WAF bypass ===========================================
  waf-target:
    build: ./docker/waf                    # nginx + ModSecurity CRS + PHP-FPM
    container_name: waf-target
    ports:
      - "8081:8080"                        # App PHP derrière pare-feu applicatif (nginx écoute 8080)
    restart: unless-stopped

  # ========== Jour 4 : Durcissement Linux ===================================
  secure-linux:
    build: ./docker/secure-linux           # Debian/Ubuntu avec configs faibles
    container_name: secure-linux-target
    ports:
      - "2224:22"                          # SSH à durcir (PermitRootLogin yes)
    privileged: true                       # Nécessaire pour iptables (UFW) et sysctl
    restart: unless-stopped

  # ========== Jour 5 : Investigation forensique =============================
  forensic-victim:
    build: ./docker/forensic               # Serveur compromis (cmd injection + backdoor)
    container_name: forensic-victim
    ports:
      - "8082:80"                          # Interface web vulnérable à ?cmd=
    restart: unless-stopped

# Réseau unique pour tous les conteneurs (pentest-lab)
networks:
  default:
    name: pentest-lab
